name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: minkert
          POSTGRES_PASSWORD: minkert_ci
          POSTGRES_DB: minkert_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U minkert -d minkert_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://minkert:minkert_ci@localhost:5432/minkert_test
      JWT_ACCESS_SECRET: ci-test-secret-min-32-chars-long!!
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Prisma migrate (CI database only)
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Audit backend (high+)
        working-directory: backend
        run: npm audit --audit-level=high || true

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Unit tests
        working-directory: backend
        run: npm test -- --passWithNoTests

      - name: E2E tests
        working-directory: backend
        run: npm run test:e2e

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
